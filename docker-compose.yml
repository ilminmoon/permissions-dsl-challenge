name: authz-policy-engine

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: authz
      POSTGRES_USER: authz
      POSTGRES_PASSWORD: authz
    ports:
      - "${AUTHZ_DB_HOST_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U authz -d authz"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 5s
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro

  app:
    build: .
    init: true
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PORT: 8080
      AUTHZ_DB_HOST: postgres
      AUTHZ_DB_PORT: 5432
      AUTHZ_DB_NAME: authz
      AUTHZ_DB_USER: authz
      AUTHZ_DB_PASSWORD: authz
      AUTHZ_DB_APPLICATION_NAME: authz-policy-engine
      AUTHZ_DB_STATEMENT_TIMEOUT_MILLIS: 5000
      AUTHZ_DB_IDLE_IN_TRANSACTION_TIMEOUT_MILLIS: 15000
      AUTHZ_DB_MAX_POOL_SIZE: 10
      AUTHZ_DB_MIN_IDLE: 1
      AUTHZ_DB_CONNECTION_ACQUISITION_TIMEOUT_MILLIS: 3000
      AUTHZ_DB_REWRITE_BATCHED_INSERTS: true
      AUTHZ_JWT_SECRET: local-dev-jwt-secret
    ports:
      - "${PORT:-8080}:8080"

volumes:
  postgres_data:
